name: Sideline content pipeline

on:
  schedule:
    # UTC times chosen so generate-briefings runs land in the refresh_window
    # the edge function derives from UTC hour (see generate-briefings/index.ts:210):
    #   <16 = morning, <22 = midday, >=22 = evening
    - cron: '0 14 * * *'  # morning  (~7a PT / 10a ET)
    - cron: '0 19 * * *'  # midday   (~12p PT / 3p ET)
    - cron: '0 23 * * *'  # evening  (~4p PT / 7p ET)
  workflow_dispatch:
    inputs:
      skip_ingest:
        description: 'Skip ingest-rss (only generate)'
        type: boolean
        default: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      URL: ${{ secrets.SUPABASE_FUNCTIONS_URL }}
      CS: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Ingest RSS
        if: ${{ inputs.skip_ingest != true }}
        run: |
          curl -fsS --retry 2 --retry-delay 10 \
            -X POST "$URL/ingest-rss" \
            -H "x-cron-secret: $CS"
          echo

      - name: Generate national briefings (per persona)
        run: |
          set -uo pipefail
          FAILED=0
          for P in cocktail_party office_watercooler date_night sports_talk_for_moms; do
            echo "=== $P ==="
            OK=0
            for i in 1 2 3; do
              R=$(curl -fsS -X POST "$URL/generate-briefings" \
                -H "content-type: application/json" \
                -H "x-cron-secret: $CS" \
                -d "{\"personas\":[\"$P\"]}") || R='{"error":"curl failed"}'
              echo "$R"
              echo "$R" | jq -r '.results[]?.image_urls[]? // empty' >> /tmp/card-art-urls.txt || true
              if echo "$R" | grep -q '"status":"succeeded"'; then OK=1; break; fi
              sleep 5
            done
            if [ "$OK" -ne 1 ]; then FAILED=1; fi
          done
          exit $FAILED

      - name: Generate local team briefings (per team)
        run: |
          set -uo pipefail
          # Must match the team names in Sideline/Views/SettingsView.swift TeamPickerView.
          TEAMS=(
            "Arizona Cardinals" "Atlanta Falcons" "Baltimore Ravens" "Buffalo Bills"
            "Carolina Panthers" "Chicago Bears" "Cincinnati Bengals" "Cleveland Browns"
            "Dallas Cowboys" "Denver Broncos" "Detroit Lions" "Green Bay Packers"
            "Houston Texans" "Indianapolis Colts" "Jacksonville Jaguars" "Kansas City Chiefs"
            "Las Vegas Raiders" "Los Angeles Chargers" "Los Angeles Rams" "Miami Dolphins"
            "Minnesota Vikings" "New England Patriots" "New Orleans Saints" "New York Giants"
            "New York Jets" "Philadelphia Eagles" "Pittsburgh Steelers" "San Francisco 49ers"
            "Seattle Seahawks" "Tampa Bay Buccaneers" "Tennessee Titans" "Washington Commanders"
          )
          FAILED=0
          for T in "${TEAMS[@]}"; do
            echo "=== local_team: $T ==="
            BODY=$(jq -nc --arg t "$T" '{personas:["local_team"],team:$t}')
            OK=0
            for i in 1 2 3; do
              R=$(curl -fsS -X POST "$URL/generate-briefings" \
                -H "content-type: application/json" \
                -H "x-cron-secret: $CS" \
                -d "$BODY") || R='{"error":"curl failed"}'
              echo "$R"
              echo "$R" | jq -r '.results[]?.image_urls[]? // empty' >> /tmp/card-art-urls.txt || true
              if echo "$R" | grep -q '"status":"succeeded"'; then OK=1; break; fi
              sleep 5
            done
            if [ "$OK" -ne 1 ]; then FAILED=1; fi
          done
          exit $FAILED

      # Pollinations generates an image the first time its URL is requested and
      # caches it by URL after that. Fetching every freshly stamped image_url
      # here (serially: the free tier allows one in-flight request per IP) means
      # phones get instant CDN hits instead of multi-second generations. The
      # same story keeps the same URL across personas and windows, so most runs
      # only warm a handful of genuinely new images. Best-effort by design: a
      # miss just means that card generates on first view in the app.
      - name: Warm card art (Pollinations CDN)
        if: always()
        run: |
          if [ ! -s /tmp/card-art-urls.txt ]; then
            echo "No card art URLs collected; nothing to warm."
            exit 0
          fi
          sort -u /tmp/card-art-urls.txt > /tmp/card-art-unique.txt
          TOTAL=$(wc -l < /tmp/card-art-unique.txt | tr -d ' ')
          echo "Warming $TOTAL unique images"
          DEADLINE=$(( $(date +%s) + 20*60 ))
          WARMED=0
          while IFS= read -r U; do
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "Time cap reached after $WARMED/$TOTAL; remaining images generate on first view."
              break
            fi
            CODE=000
            for i in 1 2 3; do
              CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 90 "$U" || echo 000)
              if [ "$CODE" = "200" ]; then WARMED=$((WARMED+1)); break; fi
              # 402/429 = the IP's single free slot is busy; wait and retry.
              sleep 15
            done
            echo "[$WARMED/$TOTAL] $CODE $U"
          done < /tmp/card-art-unique.txt
          echo "Warmed $WARMED of $TOTAL images."
          exit 0
