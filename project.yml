name: Sideline
options:
  bundleIdPrefix: com.jackwallner
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: YXG4MP6W39
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
  configs:
    Debug:
      base:
        DEBUG_INFORMATION_FORMAT: dwarf
      xcconfig: Config/Secrets.xcconfig
    Release:
      base:
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      xcconfig: Config/Secrets.xcconfig

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.14.0

schemes:
  Sideline:
    build:
      targets:
        Sideline: all
        SidelineTests: [test]
    test:
      targets:
        - SidelineTests
    run:
      config: Debug

targets:
  Shared:
    type: framework
    platform: iOS
    sources:
      - path: Shared
    dependencies:
      - package: RevenueCat
        product: RevenueCat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.sports.shared
        GENERATE_INFOPLIST_FILE: YES

  Sideline:
    type: application
    platform: iOS
    sources:
      - path: Sideline
        excludes:
          - copy/PAYWALL.md
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.sports
        INFOPLIST_FILE: Sideline/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sideline/Sideline.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: Shared
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI

  SidelineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/SidelineTests
    dependencies:
      - target: Shared
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.sports.tests
